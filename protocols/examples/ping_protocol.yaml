meta:
  id: ping_protocol
  title: "ICMP Echo (Ping) Protocol"
  description: "Simple ICMP Echo Request/Reply protocol used by the ping utility to test host reachability."
  endian: be
  version: "1.0.0"
  status: stable

fields:
  - name: type
    type: uint8
    description: "ICMP message type (8 = Echo Request, 0 = Echo Reply)"
    valid_values: [0, 8]

  - name: code
    type: uint8
    description: "ICMP subtype (always 0 for Echo Request/Reply)"
    valid_values: [0]

  - name: checksum
    type: uint16
    description: "One's complement checksum of the ICMP message"

  - name: identifier
    type: uint16
    description: "Identifier to match Echo Requests with Echo Replies"

  - name: sequence_number
    type: uint16
    description: "Sequence number incremented with each Echo Request"

  - name: payload
    type: bytes
    description: "Optional arbitrary data echoed back by the responder"
    optional: true
