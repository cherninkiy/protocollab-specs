meta:
  id: arp_protocol
  title: "Address Resolution Protocol (ARP)"
  description: >
    ARP maps a network-layer address (e.g. IPv4) to a link-layer address
    (e.g. Ethernet MAC). Defined in RFC 826. The fixed-size fields below
    assume the most common case: Ethernet hardware (HTYPE=1) over IPv4
    (PTYPE=0x0800), giving HLEN=6 and PLEN=4.
  endian: be
  version: "1.0.0"
  status: stable
  references:
    - "RFC 826 – An Ethernet Address Resolution Protocol"

fields:
  - name: htype
    type: uint16
    description: "Hardware type (HTYPE). 1 = Ethernet."
    valid_values: [1]

  - name: ptype
    type: uint16
    description: "Protocol type (PTYPE). 0x0800 = IPv4."
    valid_values: [0x0800]

  - name: hlen
    type: uint8
    description: "Hardware address length in bytes (HLEN). 6 for Ethernet MAC."
    valid_values: [6]

  - name: plen
    type: uint8
    description: "Protocol address length in bytes (PLEN). 4 for IPv4."
    valid_values: [4]

  - name: oper
    type: uint16
    description: "Operation code (OPER). 1 = ARP Request, 2 = ARP Reply."
    valid_values: [1, 2]

  - name: sha
    type: bytes
    size: 6
    description: "Sender hardware address (SHA) – MAC address of the sender."

  - name: spa
    type: bytes
    size: 4
    description: "Sender protocol address (SPA) – IPv4 address of the sender."

  - name: tha
    type: bytes
    size: 6
    description: "Target hardware address (THA) – MAC address of the target (all zeros in a Request)."

  - name: tpa
    type: bytes
    size: 4
    description: "Target protocol address (TPA) – IPv4 address of the target."
